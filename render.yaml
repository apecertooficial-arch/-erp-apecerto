services:
  - type: web
    name: apecerto-erp
    runtime: node
    region: ohio
    plan: standard
    # Chamamos o binario vinext direto (sem "pnpm build"/"pnpm start") porque o
    # pnpm 11 roda um verify-deps-before-run que falha com os build-scripts
    # nativos ignorados (esbuild/sharp/workerd) e quebrava o deploy.
    buildCommand: pnpm install && ./node_modules/.bin/vinext build
    startCommand: ./node_modules/.bin/vinext start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APECERTO_DATA_MODE
        value: production-readonly
      - key: NEXT_PUBLIC_SITE_URL
        value: https://apecerto-erp.onrender.com
      - key: NODE_VERSION
        value: "22.13.0"
