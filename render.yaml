services:
  - type: web
    name: apecerto-erp
    runtime: node
    region: ohio
    plan: standard
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APECERTO_DATA_MODE
        value: production-readonly
      - key: NODE_VERSION
        value: "22.13.0"
